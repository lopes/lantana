---
- name: "VALIDATION: Single Node Stack Verification"
  hosts: single_nodes
  become: true
  gather_facts: true

  pre_tasks:
    # ---------------------------------------------------------
    # VARIABLE LOADING
    # ---------------------------------------------------------
    - name: "Force load network variables from inventory structure"
      ansible.builtin.include_vars:
        file: "{{ inventory_dir }}/group_vars/all/network.yml"

    - name: "DEBUG: Confirm Variables Loaded"
      ansible.builtin.debug:
        msg: "Loaded Sensor IP: {{ network.sensors.sensor_01.ipv4 | default('Still Missing!') }}"

  tasks:
    # ---------------------------------------------------------
    # USER
    # ---------------------------------------------------------
    - name: "Check if required users exist"
      ansible.builtin.getent:
        database: passwd
        key: "{{ item.name }}"
      loop:
        - "{{ system.users.sensor }}"
        - "{{ system.users.collector }}"
      register: user_check

    - name: "Assert users have correct UIDs"
      ansible.builtin.assert:
        that:
          - "item.ansible_facts.getent_passwd[item.item.name][1]|int == item.item.uid"
        fail_msg: "User {{ item.item.name }} has incorrect UID. Expected {{ item.item.uid }}."
      loop: "{{ user_check.results }}"

    # ---------------------------------------------------------
    # NETWORK & PORT
    # ---------------------------------------------------------
    - name: "Check if custom SSH admin port is listening"
      ansible.builtin.wait_for:
        port: "{{ ansible_port }}"
        state: started
        timeout: 5
        connect_timeout: 2
      register: ssh_port_check
      ignore_errors: true

    - name: "Assert SSH port is reachable"
      ansible.builtin.assert:
        that: "not ssh_port_check.failed"
        fail_msg: "SSH Port {{ ansible_port }} is unreachable."

    - name: "Check if ltn0 virtual interface exists"
      ansible.builtin.command: ip addr show ltn0
      register: ltn0_check
      changed_when: false
      failed_when: ltn0_check.rc != 0

    - name: "Calculate expected IP strings"
      ansible.builtin.set_fact:
        expected_sensor_ipv4: "{{ network.sensors.sensor_01.ipv4 | regex_replace('/.*', '') }}"
        expected_sensor_ipv6: "{{ network.sensors.sensor_01.ipv6 | regex_replace('/.*', '') }}"

    - name: "Assert ltn0 has correct sensor IPs"
      ansible.builtin.assert:
        that:
          - expected_sensor_ipv4 in ltn0_check.stdout
          - expected_sensor_ipv6 in ltn0_check.stdout
        fail_msg: "Validation Failed. Expected {{ expected_sensor_ipv4 }} in ltn0 output."

    # ---------------------------------------------------------
    # FIREWALL
    # ---------------------------------------------------------
    - name: "Check if NFTables ruleset is loaded"
      ansible.builtin.command: nft list ruleset
      register: nft_check
      changed_when: false

    - name: "Assert Firewall Tables and Chains exist"
      ansible.builtin.assert:
        that:
          - "'table inet lantana_filter' in nft_check.stdout"
          - "'chain input' in nft_check.stdout"
          - "'table ip lantana_nat' in nft_check.stdout"
        fail_msg: "Critical firewall tables are missing."

    # ---------------------------------------------------------
    # FILESYSTEM
    # ---------------------------------------------------------
    - name: "Check critical directories"
      ansible.builtin.stat:
        path: "{{ item.path }}"
      loop:
        - {
            path: "/etc/lantana/honeywall/nftables/sensors",
            owner: "root",
            mode: "0755",
          }
        - { path: "/var/log/lantana/honeywall", owner: "root", mode: "0755" }
      register: dir_stats

    - name: "Assert Directory Compliance"
      ansible.builtin.assert:
        that:
          - "item.stat.exists"
          - "item.stat.pw_name == item.item.owner"
          - "item.stat.mode == item.item.mode"
        fail_msg: "Directory {{ item.item.path }} failed validation."
      loop: "{{ dir_stats.results }}"

    # ---------------------------------------------------------
    # LOGGING & CRON
    # ---------------------------------------------------------
    - name: "Check Log Rotation configurations"
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        # Must match what firewall/auth roles deploy
        - /etc/lantana/logrotate.d/00_00/firewall
        - /etc/lantana/logrotate.d/00_00/auth
        - /etc/lantana/logrotate.d/00_00/audit
        - /etc/lantana/logrotate.d/00_00/honeypots
      register: logrotate_check

    - name: "Assert Log Rotation files exist"
      ansible.builtin.assert:
        that: "item.stat.exists"
        fail_msg: "Log rotation file {{ item.item }} is missing."
      loop: "{{ logrotate_check.results }}"

    - name: "Check Cron Jobs (logs + monthly GeoIP)"
      # Pipeline jobs (prune / enrich / transform / alert / report) moved
      # from cron to systemd timers in 2026-05-22's deploy refactor;
      # /etc/cron.d/lantana-pipeline no longer exists. Only the logrotate
      # cron and the monthly GeoIP refresh stay on cron.
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - /etc/cron.d/lantana-logs
        - /etc/cron.d/lantana-geoip-update
      register: cron_check

    - name: "Assert Cron Jobs exist"
      ansible.builtin.assert:
        that: "item.stat.exists"
        fail_msg: "Cron job {{ item.item }} is missing."
      loop: "{{ cron_check.results }}"

    # lantana-alert.timer was retired when the daily brief absorbed the
    # alerter's role (single Discord message at 06:00). Four timers now
    # — prune / enrich / transform / report. The .service unit stays for
    # manual `lantana-alert --force` replays and is asserted below.
    - name: "Check pipeline systemd timer units"
      ansible.builtin.stat:
        path: "/etc/systemd/system/{{ item }}.timer"
      loop:
        - lantana-prune
        - lantana-enrich
        - lantana-transform
        - lantana-report
      register: pipeline_timer_check

    - name: "Assert pipeline systemd timers are installed"
      ansible.builtin.assert:
        that: "item.stat.exists"
        fail_msg: "Pipeline systemd timer {{ item.item }}.timer is missing."
      loop: "{{ pipeline_timer_check.results }}"

    - name: "Check pipeline systemd timers are enabled and active"
      ansible.builtin.command: "systemctl is-enabled {{ item }}.timer"
      loop:
        - lantana-prune
        - lantana-enrich
        - lantana-transform
        - lantana-report
      register: pipeline_timer_enabled
      changed_when: false
      failed_when: pipeline_timer_enabled.rc != 0 or pipeline_timer_enabled.stdout.strip() != "enabled"

    - name: "Check lantana-alert.service still exists (for manual --force replays)"
      ansible.builtin.stat:
        path: /etc/systemd/system/lantana-alert.service
      register: lantana_alert_service_check

    - name: "Assert lantana-alert.service is installed"
      ansible.builtin.assert:
        that: "lantana_alert_service_check.stat.exists"
        fail_msg: >-
          lantana-alert.service is missing — manual `lantana-alert --force`
          replays will fail. The .service unit must stay installed even
          though the .timer was retired.

    - name: "Assert legacy lantana-alert.timer is removed"
      ansible.builtin.stat:
        path: /etc/systemd/system/lantana-alert.timer
      register: lantana_alert_timer_check
      failed_when: lantana_alert_timer_check.stat.exists

    - name: "Check if Log Files are being created"
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - /var/log/lantana/honeywall/firewall.log
      register: logfile_check

    - name: "Report on Log File Status"
      ansible.builtin.debug:
        msg: "Log file {{ item.item }} status: {{ 'Present' if item.stat.exists else 'Missing (Might need traffic first)' }}"
      loop: "{{ logfile_check.results }}"

    # ---------------------------------------------------------
    # HONEYPOTS
    # ---------------------------------------------------------
    # Asserts that each honeypot listed in sensor_honeypots has its
    # rootless user-systemd unit active under stigma's scope, and that
    # the published TCP ports are accepting connections on the sensor
    # IP. Port lists: Cowrie's are fixed (2222 SSH, 2223 Telnet);
    # Dionaea's come from the role's catalog (every catalog entry is
    # always deployed — disabling a specific service is a manual
    # on-server operation, see docs/honeypots.md).
    #
    # If an operator has manually disabled a sub-service post-deploy,
    # the corresponding wait_for assertion will fail — that's the
    # intended signal that the host has drifted from the deployed
    # baseline and Ansible would revert the manual change on next run.

    - name: "Load Dionaea service catalog (only needed if dionaea is enabled)"
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../roles/dionaea/defaults/main.yml"
      when: "'dionaea' in (sensor_honeypots | default([]))"

    - name: "Probe each honeypot user-systemd service"
      become: true
      become_user: "{{ system.users.sensor.name }}"
      ansible.builtin.command: "systemctl --user is-active {{ honeypot }}.service"
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ system.users.sensor.uid }}"
      loop: "{{ sensor_honeypots | default([]) }}"
      loop_control:
        loop_var: honeypot
      register: honeypot_active_check
      changed_when: false
      # is-active returns rc=3 for inactive — capture it instead of failing
      # the task so the assert below produces a clean error message.
      failed_when: false

    - name: "Assert each honeypot user-systemd service reports active"
      ansible.builtin.assert:
        that: "result.stdout | trim == 'active'"
        fail_msg: >-
          Honeypot {{ result.honeypot }}.service is not active under stigma's
          user scope (status: {{ result.stdout | default('unknown') | trim }}).
          Investigate with: sudo -u stigma XDG_RUNTIME_DIR=/run/user/{{ system.users.sensor.uid }}
          systemctl --user status {{ result.honeypot }}.service
      loop: "{{ honeypot_active_check.results }}"
      loop_control:
        loop_var: result
        label: "{{ result.honeypot }}"

    - name: "Assert Cowrie's published TCP ports are listening on the sensor IP"
      ansible.builtin.wait_for:
        host: "{{ expected_sensor_ipv4 }}"
        port: "{{ port }}"
        state: started
        timeout: 5
        connect_timeout: 2
      loop:
        - 2222    # SSH
        - 2223    # Telnet
      loop_control:
        loop_var: port
      when: "'cowrie' in (sensor_honeypots | default([]))"

    - name: "Assert Dionaea's published TCP ports are listening on the sensor IP"
      ansible.builtin.wait_for:
        host: "{{ expected_sensor_ipv4 }}"
        port: "{{ port }}"
        state: started
        timeout: 5
        connect_timeout: 2
      loop: "{{ dionaea_service_catalog.values() | map(attribute='pub_port') | list }}"
      loop_control:
        loop_var: port
      when: "'dionaea' in (sensor_honeypots | default([]))"
