---
# --- SYSTEM PREPARATION ---
- name: "Create Dionaea configuration directory"
  become: true
  ansible.builtin.file:
    path: /etc/lantana/sensor/dionaea
    state: directory
    owner: "root"
    group: "root"
    mode: "0755"
  tags: [dionaea]

- name: "Create Dionaea data directories"
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ system.users.sensor.name }}"
    group: "{{ system.users.sensor.name }}"
    mode: "0755"
  loop:
    - /var/log/lantana/sensor/dionaea
    - /var/lib/lantana/sensor/dionaea
  tags: [dionaea]

- name: "Create Dionaea artifact directories"
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ system.users.sensor.name }}"
    group: "{{ system.users.sensor.name }}"
    mode: "0775"
  loop:
    - /var/lib/lantana/sensor/dionaea/binaries
    - /var/lib/lantana/sensor/dionaea/wwwroot
    - /var/lib/lantana/sensor/dionaea/tmp
  tags: [dionaea]

- name: "Enable linger for sensor-user"
  become: true
  ansible.builtin.command: "loginctl enable-linger {{ system.users.sensor.name }}"
  args:
    creates: "/var/lib/systemd/linger/{{ system.users.sensor.name }}"
  tags: [dionaea]

# --- CONFIGURATION FILES ---
# Dionaea reads its main config from the bundled /opt/dionaea/etc/dionaea/dionaea.cfg
# inside the container — that file globs `services/*.yaml` and `ihandlers/*.yaml`
# under the same directory. We override those two subdirectories (and only those)
# with our generated files via :ro bind-mounts in the Quadlet. The bundled
# dionaea.cfg is left untouched.
#
# A single-file overlay at /opt/dionaea/etc/dionaea/dionaea.yaml does NOT work —
# Dionaea never reads that path.

- name: "Create Dionaea per-service config directories on host"
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "root"
    group: "root"
    mode: "0755"
  loop:
    - /etc/lantana/sensor/dionaea/services
    - /etc/lantana/sensor/dionaea/ihandlers
  tags: [dionaea]

- name: "Remove legacy monolithic dionaea.yaml overlay (no longer used)"
  become: true
  ansible.builtin.file:
    path: /etc/lantana/sensor/dionaea/dionaea.yaml
    state: absent
  tags: [dionaea]

- name: "Render Dionaea per-service config files"
  become: true
  ansible.builtin.template:
    src: "services/{{ _svc }}.yaml.j2"
    dest: "/etc/lantana/sensor/dionaea/services/{{ _svc }}.yaml"
    owner: "root"
    group: "root"
    mode: "0644"
  loop: "{{ dionaea_services }}"
  loop_control:
    loop_var: _svc
  tags: [dionaea]

- name: "Render Dionaea log_json ihandler"
  become: true
  ansible.builtin.template:
    src: "ihandlers/log_json.yaml.j2"
    dest: /etc/lantana/sensor/dionaea/ihandlers/log_json.yaml
    owner: "root"
    group: "root"
    mode: "0644"
  tags: [dionaea]

- name: "Deploy persona-consistent HTTP wwwroot index page"
  become: true
  ansible.builtin.template:
    src: "wwwroot/index.html.j2"
    dest: /var/lib/lantana/sensor/dionaea/wwwroot/index.html
    owner: "{{ system.users.sensor.name }}"
    group: "{{ system.users.sensor.name }}"
    mode: "0644"
  when: "'http' in dionaea_services"
  tags: [dionaea]

- name: "Remove legacy Quadlet file from user home path"
  become: true
  ansible.builtin.file:
    path: "/home/{{ system.users.sensor.name }}/.config/containers/systemd/dionaea.container"
    state: absent
  tags: [dionaea]

- name: "Create Quadlet directory for sensor user"
  become: true
  ansible.builtin.file:
    path: "/etc/containers/systemd/users/{{ system.users.sensor.uid }}"
    state: directory
    owner: "root"
    group: "root"
    mode: "0755"
  tags: [dionaea]

- name: "Deploy Quadlet definition"
  become: true
  ansible.builtin.template:
    src: dionaea.container.j2
    dest: "/etc/containers/systemd/users/{{ system.users.sensor.uid }}/dionaea.container"
    owner: "root"
    group: "root"
    mode: "0644"
  tags: [dionaea]

- name: "Reload user systemd daemon for Quadlet"
  become: true
  become_user: "{{ system.users.sensor.name }}"
  ansible.builtin.command:
    cmd: systemctl --user daemon-reload
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ system.users.sensor.uid }}"
  changed_when: false
  tags: [dionaea]

- name: "Start Dionaea container"
  become: true
  become_user: "{{ system.users.sensor.name }}"
  ansible.builtin.systemd:
    name: "dionaea"
    state: started
    enabled: true
    scope: user
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ system.users.sensor.uid }}"
  tags: [dionaea]

- name: "Publish the Dionaea ports"
  become: true
  ansible.builtin.template:
    src: dionaea.nft.j2
    dest: /etc/lantana/honeywall/nftables/sensors/dionaea.nft
    owner: "root"
    group: "root"
    mode: "0600"
  tags: [dionaea, nftables]

- name: "Reload nftables for Dionaea"
  become: true
  ansible.builtin.service:
    name: nftables
    state: reloaded
  tags: [dionaea, nftables]

# --- LOGGING ---
- name: "Deploy Vector configuration"
  become: true
  ansible.builtin.template:
    src: dionaea.vector.yaml.j2
    dest: /etc/vector/conf.d/dionaea.yaml
    owner: "root"
    group: "root"
    mode: "0644"
  notify:
    - "Validate Vector config tree"
    - "Restart Vector"
  tags: [dionaea, vector]
