---
# --- SYSTEM PREPARATION ---
- name: "Create Dionaea configuration directory"
  become: true
  ansible.builtin.file:
    path: /etc/lantana/sensor/dionaea
    state: directory
    owner: "root"
    group: "root"
    mode: "0755"
  tags: [dionaea]

- name: "Create Dionaea data directories"
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ system.users.sensor.name }}"
    group: "{{ system.users.sensor.name }}"
    mode: "0755"
  loop:
    - /var/log/lantana/sensor/dionaea
    - /var/lib/lantana/sensor/dionaea
  tags: [dionaea]

- name: "Create Dionaea artifact directories"
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ system.users.sensor.name }}"
    group: "{{ system.users.sensor.name }}"
    mode: "0775"
  loop:
    - /var/lib/lantana/sensor/dionaea/binaries
    - /var/lib/lantana/sensor/dionaea/wwwroot
    - /var/lib/lantana/sensor/dionaea/tmp
  tags: [dionaea]

- name: "Enable linger for sensor-user"
  become: true
  ansible.builtin.command: "loginctl enable-linger {{ system.users.sensor.name }}"
  args:
    creates: "/var/lib/systemd/linger/{{ system.users.sensor.name }}"
  tags: [dionaea]

# --- CONFIGURATION FILES ---
# The dinotools/dionaea image's entrypoint copies template/etc and
# template/lib into place at startup (under /opt/dionaea/etc and
# /opt/dionaea/var/lib respectively). The bundled dionaea.cfg globs
# services-enabled/*.yaml and ihandlers-enabled/*.yaml from inside
# /opt/dionaea/etc/dionaea/. We override those two subdirectories
# (and ONLY those) with our generated files via :ro bind-mounts in
# the Quadlet, so the dionaea.cfg and other bundled fixtures get
# seeded normally while our 7 service files + log_json ihandler
# completely replace the default 16 services + 6 ihandlers.
#
# The Quadlet sets DIONAEA_FORCE_INIT_CONF=1 + DIONAEA_FORCE_INIT_DATA=1
# so the entrypoint's init runs on every start — without that, the
# `test ! -d` checks would see our bind-mounted parent directories and
# skip the seeding, leaving dionaea with no dionaea.cfg.

- name: "Create Dionaea per-service config directories on host"
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "root"
    group: "root"
    mode: "0755"
  loop:
    - /etc/lantana/sensor/dionaea/services-enabled
    - /etc/lantana/sensor/dionaea/ihandlers-enabled
  tags: [dionaea]

- name: "Remove legacy config-overlay paths (renamed 2026-05-27)"
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/lantana/sensor/dionaea/dionaea.yaml
    - /etc/lantana/sensor/dionaea/services
    - /etc/lantana/sensor/dionaea/ihandlers
  tags: [dionaea]

- name: "Render Dionaea per-service config files"
  become: true
  ansible.builtin.template:
    src: "services-enabled/{{ _svc }}.yaml.j2"
    dest: "/etc/lantana/sensor/dionaea/services-enabled/{{ _svc }}.yaml"
    owner: "root"
    group: "root"
    mode: "0644"
  loop: "{{ dionaea_service_catalog.keys() | list }}"
  loop_control:
    loop_var: _svc
  tags: [dionaea]

- name: "Render Dionaea log_json ihandler"
  become: true
  ansible.builtin.template:
    src: "ihandlers-enabled/log_json.yaml.j2"
    dest: /etc/lantana/sensor/dionaea/ihandlers-enabled/log_json.yaml
    owner: "root"
    group: "root"
    mode: "0644"
  tags: [dionaea]

- name: "Deploy persona-consistent HTTP wwwroot index page"
  become: true
  ansible.builtin.template:
    src: "wwwroot/index.html.j2"
    dest: /var/lib/lantana/sensor/dionaea/wwwroot/index.html
    owner: "{{ system.users.sensor.name }}"
    group: "{{ system.users.sensor.name }}"
    mode: "0644"
  when: "'http' in dionaea_service_catalog"
  tags: [dionaea]

- name: "Remove legacy Quadlet file from user home path"
  become: true
  ansible.builtin.file:
    path: "/home/{{ system.users.sensor.name }}/.config/containers/systemd/dionaea.container"
    state: absent
  tags: [dionaea]

- name: "Create Quadlet directory for sensor user"
  become: true
  ansible.builtin.file:
    path: "/etc/containers/systemd/users/{{ system.users.sensor.uid }}"
    state: directory
    owner: "root"
    group: "root"
    mode: "0755"
  tags: [dionaea]

- name: "Deploy Quadlet definition"
  become: true
  ansible.builtin.template:
    src: dionaea.container.j2
    dest: "/etc/containers/systemd/users/{{ system.users.sensor.uid }}/dionaea.container"
    owner: "root"
    group: "root"
    mode: "0644"
  tags: [dionaea]

- name: "Reload user systemd daemon for Quadlet"
  become: true
  become_user: "{{ system.users.sensor.name }}"
  ansible.builtin.command:
    cmd: systemctl --user daemon-reload
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ system.users.sensor.uid }}"
  changed_when: false
  tags: [dionaea]

- name: "Start Dionaea container"
  become: true
  become_user: "{{ system.users.sensor.name }}"
  ansible.builtin.systemd:
    name: "dionaea"
    state: started
    enabled: true
    scope: user
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ system.users.sensor.uid }}"
  tags: [dionaea]

- name: "Publish the Dionaea ports"
  become: true
  ansible.builtin.template:
    src: dionaea.nft.j2
    dest: /etc/lantana/honeywall/nftables/sensors/dionaea.nft
    owner: "root"
    group: "root"
    mode: "0600"
  tags: [dionaea, nftables]

- name: "Reload nftables for Dionaea"
  become: true
  ansible.builtin.service:
    name: nftables
    state: reloaded
  tags: [dionaea, nftables]

# --- LOGGING ---
- name: "Deploy Vector configuration"
  become: true
  ansible.builtin.template:
    src: dionaea.vector.yaml.j2
    dest: /etc/vector/conf.d/dionaea.yaml
    owner: "root"
    group: "root"
    mode: "0644"
  notify:
    - "Validate Vector config tree"
    - "Restart Vector"
  tags: [dionaea, vector]
