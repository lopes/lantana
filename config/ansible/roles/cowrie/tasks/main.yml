---
# --- SYSTEM PREPARATION ---
- name: "Create Cowrie configuration directory"
  become: true
  ansible.builtin.file:
    path: /etc/lantana/sensor/cowrie
    state: directory
    owner: "root"
    group: "root"
    mode: "0755"
  tags: [cowrie]

- name: "Create Cowrie data directories"
  become: true
  ansible.builtin.file:
    path: "{{ _cowrie_dir }}"
    state: directory
    owner: "{{ system.users.sensor.name }}"
    group: "{{ system.users.sensor.name }}"
    mode: "0755"
  loop:
    - /var/log/lantana/sensor/cowrie
    - /var/lib/lantana/sensor/cowrie
  loop_control:
    loop_var: _cowrie_dir
  tags: [cowrie]

- name: "Create Cowrie artifact directories"
  become: true
  ansible.builtin.file:
    path: "{{ _cowrie_dir }}"
    state: directory
    owner: "{{ system.users.sensor.name }}"
    group: "{{ system.users.sensor.name }}"
    mode: "0775"
  loop:
    - /var/lib/lantana/sensor/cowrie/keys
    - /var/lib/lantana/sensor/cowrie/tty
    - /var/lib/lantana/sensor/cowrie/downloads
    - /var/lib/lantana/sensor/cowrie/misc
  loop_control:
    loop_var: _cowrie_dir
  tags: [cowrie]

- name: "Enable linger for sensor-user"
  become: true
  ansible.builtin.command: "loginctl enable-linger {{ system.users.sensor.name }}"
  args:
    creates: "/var/lib/systemd/linger/{{ system.users.sensor.name }}"
  tags: [cowrie]

# --- CONFIGURATION FILES ---
- name: "Deploy Cowrie configuration template"
  become: true
  ansible.builtin.template:
    src: "cowrie.cfg.j2"
    dest: /etc/lantana/sensor/cowrie/cowrie.cfg
    owner: "root"
    group: "root"
    mode: "0644"
  tags: [cowrie]

- name: "Deploy Cowrie health check script"
  become: true
  ansible.builtin.copy:
    src: healthcheck.py
    dest: /etc/lantana/sensor/cowrie/healthcheck.py
    owner: "root"
    group: "root"
    mode: "0644"
  tags: [cowrie]

- name: "Create Quadlet directory for sensor user"
  become: true
  ansible.builtin.file:
    path: "/etc/containers/systemd/users/{{ system.users.sensor.uid }}"
    state: directory
    owner: "root"
    group: "root"
    mode: "0755"
  tags: [cowrie]

- name: "Deploy Quadlet definition"
  become: true
  ansible.builtin.template:
    src: cowrie.container.j2
    dest: "/etc/containers/systemd/users/{{ system.users.sensor.uid }}/cowrie.container"
    owner: "root"
    group: "root"
    mode: "0644"
  notify: "Restart Cowrie container"
  tags: [cowrie]

- name: "Reload user systemd daemon for Quadlet"
  become: true
  become_user: "{{ system.users.sensor.name }}"
  ansible.builtin.command:
    cmd: systemctl --user daemon-reload
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ system.users.sensor.uid }}"
  changed_when: false
  tags: [cowrie]

- name: "Start Cowrie container"
  become: true
  become_user: "{{ system.users.sensor.name }}"
  ansible.builtin.systemd:
    name: "cowrie"
    state: started
    enabled: true
    scope: user
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ system.users.sensor.uid }}"
  tags: [cowrie]

- name: "Publish the Cowrie ports"
  become: true
  ansible.builtin.template:
    src: cowrie.nft.j2
    dest: /etc/lantana/honeywall/nftables/sensors/cowrie.nft
    owner: "root"
    group: "root"
    mode: "0600"
  notify: "Reload nftables"
  tags: [cowrie, nftables]

# --- LOGGING ---
- name: "Deploy Vector configuration"
  become: true
  ansible.builtin.template:
    src: cowrie.vector.yaml.j2
    dest: /etc/vector/conf.d/cowrie.yaml
    owner: "root"
    group: "root"
    mode: "0644"
  notify:
    - "Validate Vector config tree"
    - "Restart Vector"
  tags: [cowrie, vector]

# --- PIPELINE BRIDGE ---
# Cowrie writes downloaded malware files at mode 0600 via Python's tempfile
# module (hardcoded, ignores umask). The lantana pipeline (running as
# nectar) needs to read them to compute SHA256 hashes. This cron uses the
# lantana-grant-read utility to relax perms once a day, just before the
# 01:00 UTC enrichment run.
- name: "Schedule daily read-permission fix for Cowrie downloads"
  become: true
  ansible.builtin.copy:
    dest: /etc/cron.d/lantana-cowrie-downloads
    content: |
      # Grant nectar read access to Cowrie downloads (0600 from tempfile) before
      # the daily enrichment run. Managed by Ansible.
      30 0 * * * root /usr/local/sbin/lantana-grant-read /var/lib/lantana/sensor/cowrie/downloads
    owner: root
    group: root
    mode: "0644"
  tags: [cowrie]
