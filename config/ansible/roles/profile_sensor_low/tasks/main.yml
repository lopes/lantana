---
# --- CONTAINER USER ---
- name: "Manage container user group"
  become: true
  ansible.builtin.group:
    gid: "{{ system.users.sensor.uid }}"
    name: "{{ system.users.sensor.name }}"
    state: present
  tags: [honeypots]

- name: "Manage container system user"
  become: true
  ansible.builtin.user:
    uid: "{{ system.users.sensor.uid }}"
    name: "{{ system.users.sensor.name }}"
    group: "{{ system.users.sensor.name }}"
    shell: /usr/sbin/nologin
    create_home: true
    system: true
    state: present
  tags: [honeypots]

- name: "Ensure sensor-user has subuid/subgid for rootless Podman"
  become: true
  ansible.builtin.lineinfile:
    path: "{{ item }}"
    regexp: "^{{ system.users.sensor.name }}"
    line: "{{ system.users.sensor.name }}:100000:65536"
    create: true
    owner: "root"
    group: "root"
    mode: "0644"
  loop:
    - /etc/subgid
    - /etc/subuid
  tags: [honeypots]

# -- SENSOR DIRECTORIES ---
- name: "Create sensor config directory"
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "root"
    group: "root"
    mode: "0755"
  loop:
    - /etc/lantana/sensor
  tags: [honeypots]

- name: "Create sensor collector directories"
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ system.users.sensor.name }}"
    group: "{{ system.users.sensor.name }}"
    mode: "0755"
  loop:
    - /var/log/lantana/sensor
    - /var/lib/lantana/sensor
  tags: [honeypots]

# --- HONEYPOTS LOG ROTATION --
- name: "Set the honeypots log rotation"
  become: true
  ansible.builtin.copy:
    src: honeypots.logrotate
    dest: /etc/lantana/logrotate.d/00_00/honeypots
    owner: root
    group: root
    mode: "0644"
  tags: [honeypots]

# --- PODMAN INSTALLATION ---
- name: "Install podman"
  become: true
  ansible.builtin.apt:
    name: podman
    update_cache: true
  tags: [honeypots]

# --- LOG FORWARDING ---
- name: "Deploy Vector forwarder configuration"
  become: true
  ansible.builtin.template:
    src: forward.vector.yaml.j2
    dest: /etc/vector/conf.d/forward.yaml
    owner: "root"
    group: "root"
    mode: "0644"
  notify: "Restart Vector"
  tags: [honeypots, vector]
