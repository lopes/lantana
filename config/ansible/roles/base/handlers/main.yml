---
# OS-wide handlers commonly used by other roles.
# These can be reused by other roles during sensor deployment.

- name: "Reload sysctl"
  become: true
  ansible.builtin.command: sysctl --system
  changed_when: false

- name: "Restart sshd"
  become: true
  ansible.builtin.service:
    name: ssh
    state: restarted

- name: "Reload nftables"
  become: true
  ansible.builtin.service:
    name: nftables
    state: reloaded
  async: 15
  poll: 0

- name: "Restart cron"
  become: true
  ansible.builtin.service:
    name: cron
    state: restarted

- name: "Restart rsyslog"
  become: true
  ansible.builtin.service:
    name: rsyslog
    state: restarted

- name: "Restart systemd-networkd"
  become: true
  ansible.builtin.service:
    name: systemd-networkd
    state: restarted
  async: 45
  poll: 0

- name: "Restart auditd"
  become: true
  ansible.builtin.service:
    name: auditd
    state: restarted
    use: service # Forces use of /sbin/service instead of systemctl

- name: "Reload systemd"
  become: true
  ansible.builtin.systemd:
    daemon_reload: true

- name: "Validate Vector config tree"
  # Validate the FULL merged config tree (main vector.yaml + every
  # conf.d/*.yaml) before restarting Vector. `vector validate` on a
  # single conf.d file fails on "No sinks defined" because sinks live
  # in honeywall/forward.yaml. Handler runs once per play in the order
  # defined in this file — must be BEFORE "Restart Vector" so a broken
  # VRL fails the play instead of crashlooping Vector. `shell:` (not
  # `command:`) is required for glob expansion. See CLAUDE.md
  # "Vector deployment discipline".
  become: true
  ansible.builtin.shell: >-
    vector validate --no-environment
    /etc/vector/vector.yaml /etc/vector/conf.d/*.yaml
  changed_when: false

- name: "Restart Vector"
  become: true
  ansible.builtin.service:
    name: vector
    state: restarted
    enabled: true
