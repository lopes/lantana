---
# --- COLLECTOR USER ---
- name: "Manage collector user group"
  become: true
  ansible.builtin.group:
    gid: "{{ system.users.collector.uid }}"
    name: "{{ system.users.collector.name }}"
    state: present
  tags: [collector]

- name: "Manage collector system user"
  become: true
  ansible.builtin.user:
    uid: "{{ system.users.collector.uid }}"
    name: "{{ system.users.collector.name }}"
    group: "{{ system.users.collector.name }}"
    shell: /usr/sbin/nologin
    create_home: false
    system: true
    state: present
  tags: [collector]

- name: "Add Vector user to collector group"
  become: true
  ansible.builtin.user:
    name: vector
    groups: "{{ system.users.collector.name }}"
    append: true
  notify: "Restart Vector"
  tags: [collector, vector]

# --- COLLECTOR DIRECTORIES ---
- name: "Create collector config directory"
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "root"
    group: "root"
    mode: "0755"
  loop:
    - /etc/lantana/collector
  tags: [collector]

- name: "Create datalake directory"
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ system.users.collector.name }}"
    group: "{{ system.users.collector.name }}"
    mode: "0770" # vector user is part of collector group and manages the data lake too
  loop:
    - /var/lib/lantana/datalake
    - /var/lib/lantana/datalake/bronze
    - /var/lib/lantana/datalake/silver
    - /var/lib/lantana/datalake/gold
  tags: [collector]

# --- SECRETS FILE ---
- name: "Deploy API credentials template"
  become: true
  ansible.builtin.template:
    src: secrets.json.j2
    dest: /etc/lantana/collector/secrets.json
    owner: "{{ system.users.collector.name }}"
    group: "{{ system.users.collector.name }}"
    mode: "0600"
  no_log: true
  tags: [collector]

# --- REPORTING CONFIG ---
- name: "Deploy reporting configuration"
  become: true
  ansible.builtin.template:
    src: reporting.json.j2
    dest: /etc/lantana/collector/reporting.json
    owner: "{{ system.users.collector.name }}"
    group: "{{ system.users.collector.name }}"
    mode: "0600"
  tags: [collector]

# --- GEOIP MMDB FILES ---
- name: "Create GeoIP directory"
  become: true
  ansible.builtin.file:
    path: /var/lib/lantana/collector/geoip
    state: directory
    owner: "{{ system.users.collector.name }}"
    group: "{{ system.users.collector.name }}"
    mode: "0755"
  tags: [collector, vector]

- name: "Download GeoLite2 MMDB files"
  become: true
  ansible.builtin.get_url:
    url: "https://download.maxmind.com/app/geoip_download?edition_id={{ item }}&license_key={{ vault_maxmind_license_key }}&suffix=tar.gz"
    dest: "/tmp/{{ item }}.tar.gz"
    mode: "0644"
  loop:
    - GeoLite2-City
    - GeoLite2-ASN
  when: vault_maxmind_license_key is defined and vault_maxmind_license_key != ""
  tags: [collector, vector]

- name: "Extract MMDB files"
  become: true
  ansible.builtin.shell:
    cmd: "tar -xzf /tmp/{{ item }}.tar.gz --wildcards '*.mmdb' --strip-components=1 -C /var/lib/lantana/collector/geoip/"
  loop:
    - GeoLite2-City
    - GeoLite2-ASN
  when: vault_maxmind_license_key is defined and vault_maxmind_license_key != ""
  changed_when: false
  tags: [collector, vector]

- name: "Set MMDB file ownership"
  become: true
  ansible.builtin.file:
    path: "/var/lib/lantana/collector/geoip/{{ item }}"
    owner: vector
    group: "{{ system.users.collector.name }}"
    mode: "0644"
  loop:
    - GeoLite2-City.mmdb
    - GeoLite2-ASN.mmdb
  when: vault_maxmind_license_key is defined and vault_maxmind_license_key != ""
  tags: [collector, vector]

- name: "Add monthly GeoIP update cron"
  become: true
  ansible.builtin.copy:
    dest: /etc/cron.d/lantana-geoip-update
    content: |
      # Update GeoLite2 MMDB files monthly (1st of month, 02:30 UTC)
      30 2 1 * * root cd /tmp && curl -sL "https://download.maxmind.com/app/geoip_download?edition_id=GeoLite2-City&license_key={{ vault_maxmind_license_key }}&suffix=tar.gz" | tar -xzf - --wildcards '*.mmdb' --strip-components=1 -C /var/lib/lantana/collector/geoip/ && curl -sL "https://download.maxmind.com/app/geoip_download?edition_id=GeoLite2-ASN&license_key={{ vault_maxmind_license_key }}&suffix=tar.gz" | tar -xzf - --wildcards '*.mmdb' --strip-components=1 -C /var/lib/lantana/collector/geoip/ && systemctl restart vector
    mode: "0644"
  when: vault_maxmind_license_key is defined and vault_maxmind_license_key != ""
  no_log: true
  tags: [collector, vector]

# --- PYTHON PIPELINE ---
- name: "Create pipeline directory"
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ system.users.collector.name }}"
    group: "{{ system.users.collector.name }}"
    mode: "0755"
  loop:
    - /opt/lantana/pipeline
    - /opt/lantana/pipeline/src
  tags: [collector, pipeline]

- name: "Sync pipeline source"
  become: true
  ansible.builtin.synchronize:
    src: "{{ playbook_dir }}/../../pipeline/"
    dest: /opt/lantana/pipeline/src/
    delete: true
    rsync_opts:
      - "--exclude=.venv"
      - "--exclude=__pycache__"
      - "--exclude=.pytest_cache"
      - "--exclude=*.egg-info"
  tags: [collector, pipeline]

- name: "Create pipeline venv"
  become: true
  become_user: "{{ system.users.collector.name }}"
  ansible.builtin.command:
    cmd: python3 -m venv /opt/lantana/pipeline/venv
    creates: /opt/lantana/pipeline/venv/bin/python3
  tags: [collector, pipeline]

- name: "Install pipeline package"
  become: true
  become_user: "{{ system.users.collector.name }}"
  ansible.builtin.command:
    cmd: /opt/lantana/pipeline/venv/bin/pip install --quiet /opt/lantana/pipeline/src/
  changed_when: false
  tags: [collector, pipeline]

# --- PIPELINE CRON JOBS ---
- name: "Add pipeline cron jobs"
  become: true
  ansible.builtin.copy:
    dest: /etc/cron.d/lantana-pipeline
    content: |
      # Lantana data pipeline — managed by Ansible
      # Prune: daily at 00:15 UTC (180-day retention + disk monitoring)
      15 0 * * * {{ system.users.collector.name }} /opt/lantana/pipeline/venv/bin/lantana-prune
      # Enrich: daily at 01:00 UTC (yesterday's bronze -> silver)
      0 1 * * * {{ system.users.collector.name }} /opt/lantana/pipeline/venv/bin/lantana-enrich
      # Transform: daily at 02:00 UTC (yesterday's silver -> gold)
      0 2 * * * {{ system.users.collector.name }} /opt/lantana/pipeline/venv/bin/lantana-transform
    mode: "0644"
  tags: [collector, pipeline]

- name: "Remove legacy shell prune script"
  become: true
  ansible.builtin.file:
    path: /usr/local/sbin/lantana-prune
    state: absent
  tags: [collector, pipeline]

- name: "Remove legacy prune cron"
  become: true
  ansible.builtin.file:
    path: /etc/cron.d/lantana-prune
    state: absent
  tags: [collector, pipeline]

# --- LOG RECEIVER ---
- name: "Deploy Vector receiver configuration"
  become: true
  ansible.builtin.template:
    src: receive.vector.yaml.j2
    dest: /etc/vector/conf.d/receive.yaml
    owner: "root"
    group: "root"
    mode: "0644"
  notify: "Restart Vector"
  tags: [collector, vector]
