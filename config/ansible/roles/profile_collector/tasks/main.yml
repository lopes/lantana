---
# --- COLLECTOR USER ---
- name: "Manage collector user group"
  become: true
  ansible.builtin.group:
    gid: "{{ system.users.collector.uid }}"
    name: "{{ system.users.collector.name }}"
    state: present
  tags: [collector]

- name: "Manage collector system user"
  become: true
  ansible.builtin.user:
    uid: "{{ system.users.collector.uid }}"
    name: "{{ system.users.collector.name }}"
    group: "{{ system.users.collector.name }}"
    shell: /usr/sbin/nologin
    create_home: false
    system: true
    state: present
  tags: [collector]

- name: "Add Vector user to collector group"
  become: true
  ansible.builtin.user:
    name: vector
    groups: "{{ system.users.collector.name }}"
    append: true
  notify: "Restart Vector"
  tags: [collector, vector]

# --- COLLECTOR DIRECTORIES ---
- name: "Create collector config directory"
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "root"
    group: "root"
    mode: "0755"
  loop:
    - /etc/lantana/collector
  tags: [collector]

- name: "Create datalake directory"
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ system.users.collector.name }}"
    group: "{{ system.users.collector.name }}"
    mode: "0770" # vector user is part of collector group and manages the data lake too
  loop:
    - /var/lib/lantana/datalake
    - /var/lib/lantana/datalake/bronze
    - /var/lib/lantana/datalake/silver
    - /var/lib/lantana/datalake/gold
  tags: [collector]

# --- SECRETS FILE ---
- name: "Deploy API credentials template"
  become: true
  ansible.builtin.template:
    src: secrets.json.j2
    dest: /etc/lantana/collector/secrets.json
    owner: "{{ system.users.collector.name }}"
    group: "{{ system.users.collector.name }}"
    mode: "0600"
  no_log: true
  tags: [collector]

# --- REPORTING CONFIG ---
- name: "Deploy reporting configuration"
  become: true
  ansible.builtin.template:
    src: reporting.json.j2
    dest: /etc/lantana/collector/reporting.json
    owner: "{{ system.users.collector.name }}"
    group: "{{ system.users.collector.name }}"
    mode: "0600"
  tags: [collector]

# --- GEOIP MMDB FILES ---
- name: "Create GeoIP directory"
  become: true
  ansible.builtin.file:
    path: /var/lib/lantana/collector/geoip
    state: directory
    owner: "{{ system.users.collector.name }}"
    group: "{{ system.users.collector.name }}"
    mode: "0755"
  tags: [collector, vector]

- name: "Deploy GeoIP refresh script"
  become: true
  ansible.builtin.template:
    src: lantana-geoip-update.sh.j2
    dest: /usr/local/sbin/lantana-geoip-update
    owner: root
    group: root
    mode: "0750"
  when: vault_apikey_maxmind is defined and vault_apikey_maxmind != ""
  no_log: true
  tags: [collector, vector]

- name: "Run GeoIP refresh"
  become: true
  ansible.builtin.command:
    cmd: /usr/local/sbin/lantana-geoip-update
  when: vault_apikey_maxmind is defined and vault_apikey_maxmind != ""
  changed_when: false
  tags: [collector, vector]

- name: "Add monthly GeoIP update cron"
  become: true
  ansible.builtin.copy:
    dest: /etc/cron.d/lantana-geoip-update
    content: |
      # Refresh GeoLite2 MMDBs monthly (1st of month, 02:30 UTC)
      30 2 1 * * root /usr/local/sbin/lantana-geoip-update && systemctl restart vector
    mode: "0644"
  when: vault_apikey_maxmind is defined and vault_apikey_maxmind != ""
  tags: [collector, vector]

# --- PYTHON PIPELINE ---
- name: "Create pipeline directories"
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ system.users.collector.name }}"
    group: "{{ system.users.collector.name }}"
    mode: "0755"
  loop:
    - /opt/lantana/pipeline
    - /opt/lantana/pipeline/cache
    - /opt/lantana/repo
  tags: [collector, pipeline]

- name: "Clone Lantana repository"
  become: true
  become_user: "{{ system.users.collector.name }}"
  ansible.builtin.git:
    repo: "{{ lantana_repo_url | default('https://github.com/lopes/lantana.git') }}"
    dest: /opt/lantana/repo
    version: "{{ lantana_repo_ref | default('main') }}"
    depth: 1
    force: false
  tags: [collector, pipeline]

- name: "Sync pipeline with uv"
  become: true
  become_user: "{{ system.users.collector.name }}"
  ansible.builtin.command:
    cmd: >-
      uv sync
      --frozen
      --project /opt/lantana/repo/pipeline/
      --python python3
  environment:
    UV_PROJECT_ENVIRONMENT: /opt/lantana/pipeline/venv
    UV_CACHE_DIR: /opt/lantana/pipeline/cache/uv
    UV_PYTHON_DOWNLOADS: never
  changed_when: false
  tags: [collector, pipeline]

# --- PIPELINE SYSTEMD TIMERS ---
# Each pipeline job is a systemd oneshot service triggered by a matching
# timer. Earlier cron+`logger -t` setup is replaced: this restores native
# journal capture, exit-code visibility (`systemctl status`), and
# Persistent=true catch-up after downtime. Schedule is identical to the
# prior cron file (00:15 / 01:00 / 04:00 / 05:00 UTC).
- name: "Deploy pipeline systemd service units"
  become: true
  ansible.builtin.template:
    src: lantana-pipeline-job.service.j2
    dest: "/etc/systemd/system/{{ item.binary }}.service"
    owner: root
    group: root
    mode: "0644"
  loop:
    - { binary: "lantana-prune",
        description: "Lantana datalake prune (180d retention + disk monitoring)" }
    - { binary: "lantana-enrich",
        description: "Lantana enrichment (bronze→silver)" }
    - { binary: "lantana-transform",
        description: "Lantana transform (silver→gold)" }
    - { binary: "lantana-alert",
        description: "Lantana daily alerter (Discord, non-clean days only)" }
    - { binary: "lantana-report",
        description: "Lantana daily intel report (Discord, always posts)" }
  vars:
    job_binary: "{{ item.binary }}"
    job_description: "{{ item.description }}"
  tags: [collector, pipeline]

- name: "Deploy pipeline systemd timer units"
  become: true
  ansible.builtin.template:
    src: lantana-pipeline-job.timer.j2
    dest: "/etc/systemd/system/{{ item.binary }}.timer"
    owner: root
    group: root
    mode: "0644"
  loop:
    - { binary: "lantana-prune",
        description: "Lantana datalake prune (180d retention + disk monitoring)",
        calendar: "*-*-* 00:15:00" }
    - { binary: "lantana-enrich",
        description: "Lantana enrichment (bronze→silver)",
        calendar: "*-*-* 01:00:00" }
    - { binary: "lantana-transform",
        description: "Lantana transform (silver→gold)",
        calendar: "*-*-* 04:00:00" }
    - { binary: "lantana-alert",
        description: "Lantana daily alerter (Discord, non-clean days only)",
        calendar: "*-*-* 05:00:00" }
    - { binary: "lantana-report",
        description: "Lantana daily intel report (Discord, always posts)",
        calendar: "*-*-* 06:00:00" }
  vars:
    job_binary: "{{ item.binary }}"
    job_description: "{{ item.description }}"
    on_calendar: "{{ item.calendar }}"
  tags: [collector, pipeline]

- name: "Enable and start pipeline systemd timers"
  become: true
  ansible.builtin.systemd:
    name: "{{ item }}.timer"
    enabled: true
    state: started
    daemon_reload: true
  loop:
    - lantana-prune
    - lantana-enrich
    - lantana-transform
    - lantana-alert
    - lantana-report
  tags: [collector, pipeline]

- name: "Remove legacy pipeline cron file"
  become: true
  ansible.builtin.file:
    path: /etc/cron.d/lantana-pipeline
    state: absent
  tags: [collector, pipeline]

- name: "Remove legacy shell prune script"
  become: true
  ansible.builtin.file:
    path: /usr/local/sbin/lantana-prune
    state: absent
  tags: [collector, pipeline]

- name: "Remove legacy prune cron"
  become: true
  ansible.builtin.file:
    path: /etc/cron.d/lantana-prune
    state: absent
  tags: [collector, pipeline]

# --- LOG RECEIVER ---
- name: "Deploy Vector receiver configuration"
  become: true
  ansible.builtin.template:
    src: receive.vector.yaml.j2
    dest: /etc/vector/conf.d/receive.yaml
    owner: "root"
    group: "root"
    mode: "0644"
  notify:
    - "Validate Vector config tree"
    - "Restart Vector"
  tags: [collector, vector]
