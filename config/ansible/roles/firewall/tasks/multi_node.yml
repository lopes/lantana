---
- name: "[Multi] Deploy firewall rules"
  become: true
  ansible.builtin.template:
    src: firewall-multi.nft.j2
    dest: /etc/lantana/honeywall/nftables/firewall.nft
    owner: root
    group: root
    mode: "0600"
    validate: /usr/sbin/nft -c -f %s
  notify: "Reload nftables"
  tags: [nftables]

- name: "[Multi] Update nftables.conf to load network + firewall logic"
  become: true
  ansible.builtin.copy:
    dest: /etc/nftables.conf
    content: |
      #!/usr/sbin/nft -f
      flush ruleset
      include "/etc/lantana/honeywall/nftables/network.nft"
      include "/etc/lantana/honeywall/nftables/firewall.nft"
    owner: root
    group: root
    mode: "0755"
    validate: /usr/sbin/nft -c -f %s
  notify: "Reload nftables"
  tags: [nftables]
