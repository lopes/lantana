---
# --- FIREWALL LOGGING ---
- name: "Setup firewall connections logging"
  become: true
  ansible.builtin.copy:
    src: 10-nftables.conf
    dest: /etc/rsyslog.d/
    owner: root
    group: root
    mode: "0644"
  notify: "Restart rsyslog"
  tags: [nftables]

- name: "Setup log rotation of firewall connections"
  become: true
  ansible.builtin.copy:
    src: firewall.logrotate
    dest: /etc/lantana/logrotate.d/00_00/firewall
    owner: root
    group: root
    mode: "0644"
  tags: [nftables]

- name: "Deploy Vector configuration"
  become: true
  ansible.builtin.template:
    src: firewall.vector.yaml.j2
    dest: /etc/vector/conf.d/firewall.yaml
    owner: "root"
    group: "root"
    mode: "0644"
  tags: [nftables, vector]

# `vector validate %s` on a single conf.d file fails on "No sinks defined" —
# the sinks live in honeywall/forward.yaml. Validate the merged tree (main
# config + every conf.d/*.yaml) BEFORE restarting Vector, so a syntactically
# broken VRL fails the play instead of restarting Vector into a crashloop
# (root cause of the 2026-05-21 10:47 outage).
- name: "Validate full Vector config tree"
  become: true
  ansible.builtin.command:
    cmd: "vector validate --no-environment /etc/vector/vector.yaml /etc/vector/conf.d/"
  changed_when: false
  tags: [nftables, vector]

- name: "Restart Vector"
  become: true
  ansible.builtin.service:
    name: vector
    state: restarted
    enabled: true
  tags: [nftables, vector]

# --- MODE SPECIFIC CONFIGURATION ---
- name: "Configure single node firewall"
  ansible.builtin.include_tasks: single_node.yml
  when: lantana.mode == "single"
  tags: [nftables]

- name: "Configure multi node firewall"
  ansible.builtin.include_tasks: multi_node.yml
  when: lantana.mode == "multi"
  tags: [nftables]
