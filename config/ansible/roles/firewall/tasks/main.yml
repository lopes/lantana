---
# --- FIREWALL LOGGING ---
- name: "Setup firewall connections logging"
  become: true
  ansible.builtin.copy:
    src: 10-nftables.conf
    dest: /etc/rsyslog.d/
    owner: root
    group: root
    mode: "0644"
  notify: "Restart rsyslog"
  tags: [nftables]

- name: "Setup log rotation of firewall connections"
  become: true
  ansible.builtin.copy:
    src: firewall.logrotate
    dest: /etc/lantana/logrotate.d/00_00/firewall
    owner: root
    group: root
    mode: "0644"
  tags: [nftables]

- name: "Deploy Vector configuration"
  become: true
  ansible.builtin.template:
    src: firewall.vector.yaml.j2
    dest: /etc/vector/conf.d/firewall.yaml
    owner: "root"
    group: "root"
    mode: "0644"
  tags: [nftables, vector]

- name: "Restart Vector"
  become: true
  ansible.builtin.service:
    name: vector
    state: restarted
    enabled: true
  tags: [nftables, vector]

# --- MODE SPECIFIC CONFIGURATION ---
- name: "Configure single node firewall"
  ansible.builtin.include_tasks: single_node.yml
  when: lantana.mode == "single"
  tags: [nftables]

- name: "Configure multi node firewall"
  ansible.builtin.include_tasks: multi_node.yml
  when: lantana.mode == "multi"
  tags: [nftables]
