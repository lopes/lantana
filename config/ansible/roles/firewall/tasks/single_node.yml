---
# --- PLUGIN INFRASTRUCTURE ---
- name: "[Single] Create sensor firewall rule directory"
  become: true
  ansible.builtin.file:
    path: /etc/lantana/honeywall/nftables/sensors
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: "[Single] Create generic placeholder rule to prevent glob errors"
  become: true
  ansible.builtin.copy:
    dest: /etc/lantana/honeywall/nftables/sensors/00-void.nft
    content: "# Placeholder file to allow empty includes (do not delete)\n"
    owner: root
    group: root
    mode: "0600"

# --- RULE DEPLOYMENT ---
- name: "[Single] Deploy firewall configuration template"
  become: true
  template:
    src: "firewall-single.nft.j2"
    dest: /etc/lantana/honeywall/nftables/firewall.nft
    owner: root
    group: root
    mode: "0600"

- name: "[Single] Update nftables.conf to load firewall logic"
  become: true
  ansible.builtin.copy:
    dest: /etc/nftables.conf
    content: |
      #!/usr/sbin/nft -f
      flush ruleset

      # 1. Load Network Variables (Interfaces/IPs defined in network role)
      include "/etc/lantana/honeywall/nftables/network.nft"

      # 2. Load Main Firewall Logic (Defined in this role)
      include "/etc/lantana/honeywall/nftables/firewall.nft"
    owner: root
    group: root
    mode: "0755"
    validate: /usr/sbin/nft -c -f %s
  notify: "Reload nftables"

# --- SERVICE STATE ---
- name: "[Single] Ensure nftables service is enabled and started"
  become: true
  ansible.builtin.service:
    name: nftables
    state: started
    enabled: true

# --- APPLY NEW FIREWALL RULESET ---
- name: "[Single] Reload nftables ruleset"
  become: true
  ansible.builtin.systemd:
    name: nftables
    state: reloaded
  async: 15
  poll: 0

- name: "[Single] Reset SSH connection to clear firewall state"
  become: true
  ansible.builtin.meta: reset_connection

- name: "[Single] Wait for SSH to become available again"
  become: true
  ansible.builtin.wait_for_connection:
    timeout: 30
    delay: 2
