---
# --- HONEYWALL DIRECTORIES ---
- name: "Create honeywall configuration directories"
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "root"
    group: "root"
    mode: "0755"
  loop:
    - /etc/lantana/honeywall
    - /etc/lantana/honeywall/nftables
  tags: [nftables]

- name: "Create honeywall directories"
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "root"
    group: "root"
    mode: "0755"
  loop:
    - /var/log/lantana/honeywall
    - /var/log/lantana/honeywall/auth
    - /var/log/lantana/honeywall/audit
    - /var/log/lantana/honeywall/nftables
  tags: [nftables]

# --- AUDITD SETUP ---
- name: "Ensure auditd packages are installed"
  become: true
  ansible.builtin.apt:
    name:
      - auditd
      - audispd-plugins
    state: present
  tags: [nftables]

- name: "Configure auditd to NOT write local logs (Rsyslog handles it)"
  become: true
  ansible.builtin.lineinfile:
    path: /etc/audit/auditd.conf
    regexp: "^write_logs"
    line: "write_logs = no"
  notify: "Restart auditd"
  tags: [nftables]

# --- AUDIT AND AUTHENTICATION LOGGING ---
- name: "Log audit and authentication events"
  become: true
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /etc/rsyslog.d/
    owner: root
    group: root
    mode: "0644"
  loop:
    - 20-audit.conf
    - 30-auth.conf
  notify: "Restart rsyslog"
  tags: [nftables]

- name: "Forces handler to flush immediately"
  ansible.builtin.meta: flush_handlers
  tags: [nftables]

- name: "Log rotation of authentication events"
  become: true
  ansible.builtin.copy:
    src: auth.logrotate
    dest: /etc/lantana/logrotate.d/00_00/auth
    owner: root
    group: root
    mode: "0644"
  tags: [nftables]

- name: "Log rotation of audit events"
  become: true
  ansible.builtin.copy:
    src: audit.logrotate
    dest: /etc/lantana/logrotate.d/00_00/audit
    owner: root
    group: root
    mode: "0644"
  tags: [nftables]

- name: "Deploy Vector forwarder configuration"
  become: true
  ansible.builtin.template:
    src: forward.vector.yaml.j2
    dest: /etc/vector/conf.d/forward.yaml
    owner: "root"
    group: "root"
    mode: "0644"
  notify: "Restart Vector"
  tags: [nftables, vector]
