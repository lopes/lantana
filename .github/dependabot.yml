version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/pipeline"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "python"]
    groups:
      python-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "terraform"
    directory: "/infra/terraform/environments/proxmox"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["dependencies", "terraform"]
    groups:
      terraform-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["dependencies", "ci"]
    groups:
      actions-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
