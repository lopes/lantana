---
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (pytest + ruff + mypy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: pipeline/uv.lock

      - name: Sync dev dependencies
        run: uv sync --frozen --extra dev

      - name: pytest
        run: uv run pytest -m "not integration"

      - name: ruff check
        run: uv run ruff check .

      - name: mypy --strict
        run: uv run mypy --strict src tests

  terraform:
    name: Terraform (fmt + validate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.5"
          terraform_wrapper: false

      - name: terraform fmt -check -recursive
        run: terraform fmt -check -recursive .
        working-directory: infra/terraform

      - name: terraform init (proxmox env)
        run: terraform init -backend=false -input=false
        working-directory: infra/terraform/environments/proxmox

      - name: terraform validate (proxmox env)
        run: terraform validate
        working-directory: infra/terraform/environments/proxmox

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: shellcheck
        run: shellcheck scripts/*.sh

  ansible-lint:
    name: Ansible-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ansible and ansible-lint
        run: pip install --upgrade ansible ansible-lint

      - name: ansible-lint
        working-directory: config/ansible
        run: ansible-lint playbooks roles tests
